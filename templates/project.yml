name: __APP_NAME__
options:
  bundleIdPrefix: com.__APP_NAME_LOWER__
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: true
    SWIFT_STRICT_CONCURRENCY: complete

fileGroups:
  - Shared

targets:

  __APP_NAME__:
    type: application
    supportedDestinations: [iOS]
    deploymentTarget:
      iOS: "18.0"
    sources:
      - path: __APP_NAME__
      - path: Shared
    resources:
      - path: __APP_NAME__/Assets.xcassets
    info:
      path: __APP_NAME__/Info.plist
      properties:
        CFBundleDisplayName: __APP_NAME__
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: __APP_NAME__/__APP_NAME__.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.__APP_NAME_LOWER__.shared

  __APP_NAME__Widget:
    type: app-extension
    supportedDestinations: [iOS]
    deploymentTarget:
      iOS: "18.0"
    sources:
      - path: __APP_NAME__Widget
      - path: Shared
        excludes:
          - "Services/**"
    info:
      path: __APP_NAME__Widget/Info.plist
      properties:
        CFBundleDisplayName: __APP_NAME__ Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: __APP_NAME__Widget/__APP_NAME__Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.__APP_NAME_LOWER__.shared

  __APP_NAME__Tests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    sources:
      - path: __APP_NAME__Tests
      - path: Shared
    dependencies:
      - target: __APP_NAME__
    info:
      path: __APP_NAME__Tests/Info.plist

  __APP_NAME__UITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - path: __APP_NAME__UITests
    dependencies:
      - target: __APP_NAME__
    info:
      path: __APP_NAME__UITests/Info.plist
